---
# Ansible Playbook — Deploy Application via Docker
# Usage: ansible-playbook deploy.yml -i inventory.ini --extra-vars "image_tag=42 app_name=my-app nexus_url=http://nexus:8081"

- name: Deploy Application to Target Server
  hosts: deploy_servers
  become: yes
  vars:
    container_name: "{{ app_name }}"
    app_port: 8080
    host_port: 80
    docker_image: "{{ nexus_url }}/docker-hosted/{{ app_name }}:{{ image_tag }}"

  tasks:

    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Pull latest Docker image
      docker_image:
        name: "{{ docker_image }}"
        source: pull
        force_source: yes

    - name: Stop existing container (if running)
      docker_container:
        name: "{{ container_name }}"
        state: stopped
      ignore_errors: yes

    - name: Remove old container
      docker_container:
        name: "{{ container_name }}"
        state: absent
      ignore_errors: yes

    - name: Start new container
      docker_container:
        name: "{{ container_name }}"
        image: "{{ docker_image }}"
        state: started
        restart_policy: always
        ports:
          - "{{ host_port }}:{{ app_port }}"
        env:
          APP_ENV: "production"
          JAVA_OPTS: "-Xms256m -Xmx512m"

    - name: Wait for application to be ready
      uri:
        url: "http://localhost:{{ host_port }}/health"
        status_code: 200
      register: health_check
      retries: 10
      delay: 10
      until: health_check.status == 200

    - name: Confirm deployment success
      debug:
        msg: "Application {{ app_name }}:{{ image_tag }} deployed successfully!"
